<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Pink Gallery</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">

  <style>
    /* ===============================
       GLOBAL STYLES
    ================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe6ee, #fff0f5, #ffe4ec);
      color: #222;
      min-height: 100vh;
    }

    body {
      position: relative;
    }

    /* ===============================
       FLOATING HEARTS & SPARKLES
    ================================= */
    .background-effects {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .heart,
    .sparkle {
      position: absolute;
      opacity: 0.7;
      animation: floatUp linear infinite;
    }

    .heart {
      color: #ff6fa3;
      font-size: 20px;
    }

    .sparkle {
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px white;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      10% {
        opacity: 0.8;
      }

      100% {
        transform: translateY(-120vh) scale(1.2);
        opacity: 0;
      }
    }

    /* ===============================
       PAGE SYSTEM
    ================================= */
    .page {
      width: 100%;
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 2;
      animation: fadeIn 0.8s ease;
    }

    .page.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===============================
       GLASS CARD
    ================================= */
    .glass-card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 28px;
      padding: 35px 25px;
      text-align: center;
      box-shadow:
        0 10px 40px rgba(255, 120, 170, 0.18),
        inset 0 0 15px rgba(255,255,255,0.4);
    }

    /* ===============================
       PASSWORD PAGE
    ================================= */
    .quote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 4vw, 1.35rem);
      line-height: 1.8;
      margin-bottom: 28px;
      color: #000;
    }

    .password-input {
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.7);
      box-shadow: inset 0 2px 10px rgba(255, 163, 191, 0.25);
      transition: 0.3s ease;
    }

    .password-input:focus {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 111, 163, 0.35);
    }

    .cute-btn {
      margin-top: 20px;
      padding: 14px 32px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff8db8, #ffb3cd);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 18px rgba(255, 111, 163, 0.45);
    }

    .cute-btn:hover,
    .cute-btn:active {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 0 25px rgba(255, 111, 163, 0.7);
    }

    .error-text {
      margin-top: 15px;
      color: #ff3b7c;
      font-size: 0.95rem;
      opacity: 0;
      transition: 0.4s ease;
      min-height: 24px;
    }

    .error-text.show {
      opacity: 1;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    /* ===============================
       GALLERY STYLES
    ================================= */
    .gallery-card {
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .gallery-image {
      width: 100%;
      max-height: 72vh;
      object-fit: cover;
      border-radius: 28px;
      border: 3px solid rgba(255,255,255,0.7);
      box-shadow:
        0 10px 35px rgba(255, 132, 180, 0.3),
        0 0 25px rgba(255, 173, 205, 0.5);
      animation: imageFloat 4s ease-in-out infinite;
    }

    @keyframes imageFloat {
      0%, 100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .gallery-btn {
      margin-top: 22px;
      width: 100%;
    }

    /* ===============================
       FINAL PAGE
    ================================= */
    .final-text {
      font-size: clamp(2rem, 8vw, 4rem);
      color: #ff5f97;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
      animation: pulse 2s infinite;
      font-weight: 600;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }
    }

    /* ===============================
       CONFETTI CANVAS
    ================================= */
    #confettiCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ===============================
       MOBILE RESPONSIVE
    ================================= */
    @media (max-width: 600px) {
      .glass-card {
        padding: 28px 20px;
        border-radius: 24px;
      }

      .gallery-image {
        max-height: 65vh;
      }

      .cute-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Background Effects -->
  <div class="background-effects" id="effects"></div>

  <!-- Confetti Canvas -->
  <canvas id="confettiCanvas"></canvas>

  <!-- ===============================
       PASSWORD PAGE
  ================================= -->
  <section class="page active" id="passwordPage">
    <div class="glass-card">
      <div class="quote">
        Tumah midang en ve phal anilo, inlo en lui(in thei dawn chuangloa) anih chuan kan tsunami ang che
      </div>

      <input
        type="password"
        id="passwordInput"
        class="password-input"
        placeholder="Enter Passcode"
      />

      <button class="cute-btn" onclick="checkPassword()">
        Open
      </button>

      <div class="error-text" id="errorText">
        Wrong passcode hehe 💖
      </div>
    </div>
  </section>

  <!-- ===============================
       GALLERY CONTAINER
  ================================= -->
  <div id="galleryContainer"></div>

  <!-- ===============================
       FINAL PAGE
  ================================= -->
  <section class="page" id="finalPage">
    <div class="glass-card">
      <div class="final-text">The End 💖</div>
    </div>
  </section>

  <script>
    // =====================================
    // IMAGE LIST
    // =====================================
    const images = [
      '1.jpeg', '2.jpeg', '3.jpeg', '4.jpeg', '5.jpeg',
      '6.jpeg', '7.jpeg', '8.jpeg', '9.jpeg', '10.jpeg',
      '11.jpeg', '12.jpeg', '13.jpeg', '14.jpeg', '15.jpeg',
      '16.jpeg', '17.jpeg', '18.jpeg', '19.jpeg', '20.jpeg',
      '21.jpeg', '22.jpeg', '23.jpeg'
    ];

    // =====================================
    // CREATE GALLERY PAGES
    // =====================================
    const galleryContainer = document.getElementById('galleryContainer');

    images.forEach((image, index) => {
      const page = document.createElement('section');
      page.className = 'page';
      page.id = `slide-${index + 1}`;

      page.innerHTML = `
        <div class="gallery-card">
          <img src="${image}" alt="Gallery ${index + 1}" class="gallery-image">
          <button class="cute-btn gallery-btn" onclick="nextSlide(${index + 1})">
            Next 💕
          </button>
        </div>
      `;

      galleryContainer.appendChild(page);
    });

    // =====================================
    // PASSWORD CHECK
    // =====================================
    function checkPassword() {
      const password = document.getElementById('passwordInput').value;
      const errorText = document.getElementById('errorText');

      if (password === '25032026') {
        errorText.classList.remove('show');

        launchConfetti();

        setTimeout(() => {
          showPage('slide-1');
        }, 700);

      } else {
        errorText.classList.add('show');
      }
    }

    // =====================================
    // PAGE SWITCHING
    // =====================================
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
      });

      document.getElementById(pageId).classList.add('active');
    }

    // =====================================
    // NEXT SLIDE FUNCTION
    // =====================================
    function nextSlide(current) {
      launchConfetti();

      setTimeout(() => {
        const next = current + 1;

        if (next <= images.length) {
          showPage(`slide-${next}`);
        } else {
          showPage('finalPage');
        }
      }, 500);
    }

    // =====================================
    // FLOATING HEARTS & SPARKLES
    // =====================================
    const effectsContainer = document.getElementById('effects');

    function createEffect() {
      const isHeart = Math.random() > 0.35;

      const element = document.createElement('div');
      element.className = isHeart ? 'heart' : 'sparkle';

      if (isHeart) {
        element.innerHTML = ['💖', '💕', '💗', '✨'][Math.floor(Math.random() * 4)];
        element.style.fontSize = Math.random() * 18 + 16 + 'px';
      }

      element.style.left = Math.random() * 100 + 'vw';
      element.style.animationDuration = (Math.random() * 6 + 6) + 's';

      effectsContainer.appendChild(element);

      setTimeout(() => {
        element.remove();
      }, 12000);
    }

    setInterval(createEffect, 350);

    // =====================================
    // CONFETTI EFFECT
    // =====================================
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');

    let confettiPieces = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function createConfetti() {
      confettiPieces = [];

      for (let i = 0; i < 180; i++) {
        confettiPieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 2,
          d: Math.random() * 40 + 10,
          color: [
            '#ff8db8',
            '#ffd1e3',
            '#ffffff',
            '#ffb6d0',
            '#ffe8f0'
          ][Math.floor(Math.random() * 5)],
          tilt: Math.random() * 10 - 10,
          tiltAngleIncremental: Math.random() * 0.07 + 0.05,
          tiltAngle: 0
        });
      }
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      confettiPieces.forEach(piece => {
        ctx.beginPath();
        ctx.lineWidth = piece.r;
        ctx.strokeStyle = piece.color;
        ctx.moveTo(piece.x + piece.tilt + piece.r / 3, piece.y);
        ctx.lineTo(piece.x + piece.tilt, piece.y + piece.tilt + piece.r / 3);
        ctx.stroke();
      });

      updateConfetti();
    }

    function updateConfetti() {
      confettiPieces.forEach(piece => {
        piece.tiltAngle += piece.tiltAngleIncremental;
        piece.y += (Math.cos(piece.d) + 3 + piece.r / 2) / 2;
        piece.tilt = Math.sin(piece.tiltAngle) * 15;

        if (piece.y > canvas.height) {
          piece.y = -20;
        }
      });
    }

    function animateConfetti() {
      drawConfetti();
      requestAnimationFrame(animateConfetti);
    }

    animateConfetti();

    function launchConfetti() {
      createConfetti();

      setTimeout(() => {
        confettiPieces = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 2500);
    }

    // =====================================
    // ENTER KEY SUPPORT
    // =====================================
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        checkPassword();
      }
    });
  </script>
</body>
</html>
